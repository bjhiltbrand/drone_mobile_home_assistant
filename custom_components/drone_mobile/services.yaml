refresh_device_status:
  name: Refresh Device Status
  description: >
    Poll the vehicle's DroneMobile device for the latest status information.
    Use sparingly as this consumes vehicle battery and cellular data.
    The service name includes your vehicle name with spaces replaced by underscores:
    drone_mobile.refresh_device_status_VEHICLE_NAME
  fields: {}

dump_device_data:
  name: Dump Device Data
  description: >
    Export the currently cached vehicle data to a JSON file in your Home Assistant
    config directory. Useful for debugging and support requests.
    The service name includes your vehicle name with spaces replaced by underscores:
    drone_mobile.dump_device_data_VEHICLE_NAME
  fields: {}