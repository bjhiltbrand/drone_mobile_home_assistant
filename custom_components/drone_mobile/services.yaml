# Services are now dynamically registered per vehicle
# Format: drone_mobile.refresh_device_status_[vehicle_name]
# Format: drone_mobile.dump_device_data_[vehicle_name]

# Example for a vehicle named "My Car":
# - drone_mobile.refresh_device_status_my_car
# - drone_mobile.dump_device_data_my_car

# Services will appear automatically in Home Assistant's Developer Tools > Services
# after the integration is set up.